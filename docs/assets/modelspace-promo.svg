<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" fill="#e6edf3" font-size="28" font-weight="700" font-family="system-ui,sans-serif">ModelSpace</text>
  <text x="400" y="58" text-anchor="middle" fill="#8b949e" font-size="14" font-family="system-ui,sans-serif">认知模型三维坐标系 / Cognitive Model 3D</text>

  <line x1="100" y1="240" x2="540" y2="240" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="100" y="265" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="system-ui,sans-serif">过去 / Past</text>
  <circle cx="320" cy="240" r="5" fill="#7ee787"/>
  <text x="320" y="275" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="600" font-family="system-ui,sans-serif">现在 / Present</text>
  <text x="540" y="265" text-anchor="middle" fill="#c9d1d9" font-size="11" font-family="system-ui,sans-serif">未来 / Future</text>

  <line x1="320" y1="240" x2="180" y2="80" stroke="#56d4dd" stroke-width="1.5"/>
  <text x="305" y="210" text-anchor="middle" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">元认知层 / Meta-Cognition</text>
  <text x="260" y="155" text-anchor="middle" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">战略层 / Strategy</text>
  <text x="230" y="215" text-anchor="middle" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">结构层 / Structure</text>
  <text x="200" y="275" text-anchor="middle" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">表达层 / Output</text>

  <line x1="320" y1="240" x2="560" y2="440" stroke="#a371f7" stroke-width="1.5"/>
  <circle cx="320" cy="240" r="3" fill="#a371f7"/>
  <circle cx="385" cy="285" r="2.5" fill="#a371f7"/>
  <circle cx="450" cy="330" r="2.5" fill="#a371f7"/>
  <circle cx="515" cy="375" r="2.5" fill="#a371f7"/>
  <text x="328" y="248" text-anchor="start" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">元模型 / Meta Model</text>
  <text x="390" y="288" text-anchor="start" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">原则 / Principle</text>
  <text x="450" y="328" text-anchor="start" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">方法 / Method</text>
  <text x="510" y="368" text-anchor="start" fill="#c9d1d9" font-size="10" font-family="system-ui,sans-serif">工具 / Tool</text>

  <circle cx="350" cy="225" r="7" fill="none" stroke="#ffc777" stroke-width="2" filter="url(#glow)"/>
  <text x="350" y="212" text-anchor="middle" fill="#ffc777" font-size="10" font-weight="600">MECE</text>
  <circle cx="430" cy="310" r="7" fill="none" stroke="#84f4b4" stroke-width="2" filter="url(#glow)"/>
  <text x="430" y="297" text-anchor="middle" fill="#84f4b4" font-size="10" font-weight="600">OKR</text>
</svg>
