<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#0d1520" />
  <rect x="28" y="28" width="744" height="744" rx="24" fill="#121c2a" stroke="rgba(180,210,230,0.35)" stroke-width="1" />
  <text x="400" y="72" text-anchor="middle" fill="rgba(190,210,230,0.85)" font-size="24" font-family="Inter,Arial,sans-serif">Issue Tree / Logic Tree</text>
  <text x="400" y="98" text-anchor="middle" fill="rgba(150,170,195,0.6)" font-size="14" font-family="Inter,Arial,sans-serif">left → right · MECE branches</text>

  <!-- Key question (left) -->
  <rect x="48" y="320" width="160" height="56" rx="10" fill="#00f0ff" fill-opacity="0.15" stroke="#00f0ff" stroke-opacity="0.7" />
  <text x="128" y="355" text-anchor="middle" fill="#dbe8f4" font-size="18" font-family="Inter,Arial,sans-serif">Key question</text>
  <text x="128" y="375" text-anchor="middle" fill="rgba(180,210,230,0.7)" font-size="13" font-family="Inter,Arial,sans-serif">why / how</text>

  <!-- Level 1 branches (MECE) -->
  <line x1="208" y1="348" x2="280" y2="280" stroke="rgba(0,240,255,0.5)" stroke-width="2" />
  <line x1="208" y1="348" x2="280" y2="348" stroke="rgba(0,240,255,0.5)" stroke-width="2" />
  <line x1="208" y1="348" x2="280" y2="416" stroke="rgba(0,240,255,0.5)" stroke-width="2" />

  <rect x="280" y="248" width="140" height="48" rx="8" fill="#ff8c42" fill-opacity="0.2" stroke="#ff8c42" stroke-opacity="0.7" />
  <text x="350" y="278" text-anchor="middle" fill="#dbe8f4" font-size="15" font-family="Inter,Arial,sans-serif">Branch A</text>

  <rect x="280" y="316" width="140" height="48" rx="8" fill="#9d7bff" fill-opacity="0.2" stroke="#9d7bff" stroke-opacity="0.7" />
  <text x="350" y="346" text-anchor="middle" fill="#dbe8f4" font-size="15" font-family="Inter,Arial,sans-serif">Branch B</text>

  <rect x="280" y="384" width="140" height="48" rx="8" fill="#4ecdc4" fill-opacity="0.2" stroke="#4ecdc4" stroke-opacity="0.7" />
  <text x="350" y="414" text-anchor="middle" fill="#dbe8f4" font-size="15" font-family="Inter,Arial,sans-serif">Branch C</text>

  <!-- Level 2 expansion (right) -->
  <line x1="420" y1="272" x2="480" y2="220" stroke="rgba(255,140,66,0.4)" stroke-width="1.5" />
  <line x1="420" y1="272" x2="480" y2="272" stroke="rgba(255,140,66,0.4)" stroke-width="1.5" />

  <rect x="480" y="188" width="110" height="36" rx="6" fill="#ff8c42" fill-opacity="0.12" stroke="#ff8c42" stroke-opacity="0.5" />
  <text x="535" y="212" text-anchor="middle" fill="rgba(219,232,244,0.9)" font-size="13" font-family="Inter,Arial,sans-serif">A1</text>

  <rect x="480" y="240" width="110" height="36" rx="6" fill="#ff8c42" fill-opacity="0.12" stroke="#ff8c42" stroke-opacity="0.5" />
  <text x="535" y="264" text-anchor="middle" fill="rgba(219,232,244,0.9)" font-size="13" font-family="Inter,Arial,sans-serif">A2</text>

  <line x1="420" y1="340" x2="480" y2="340" stroke="rgba(157,123,255,0.4)" stroke-width="1.5" />
  <line x1="420" y1="340" x2="480" y2="388" stroke="rgba(157,123,255,0.4)" stroke-width="1.5" />

  <rect x="480" y="316" width="110" height="36" rx="6" fill="#9d7bff" fill-opacity="0.12" stroke="#9d7bff" stroke-opacity="0.5" />
  <text x="535" y="340" text-anchor="middle" fill="rgba(219,232,244,0.9)" font-size="13" font-family="Inter,Arial,sans-serif">B1</text>

  <rect x="480" y="368" width="110" height="36" rx="6" fill="#9d7bff" fill-opacity="0.12" stroke="#9d7bff" stroke-opacity="0.5" />
  <text x="535" y="392" text-anchor="middle" fill="rgba(219,232,244,0.9)" font-size="13" font-family="Inter,Arial,sans-serif">B2</text>

  <!-- Arrow: left to right progression -->
  <path d="M 640 400 L 720 400" stroke="rgba(0,240,255,0.25)" stroke-width="1" stroke-dasharray="6 4" />
  <text x="680" y="388" text-anchor="middle" fill="rgba(150,170,195,0.5)" font-size="11" font-family="Inter,Arial,sans-serif">detail</text>

  <!-- Bottom: Profit example (Wikipedia/Chevallier) -->
  <rect x="200" y="540" width="400" height="80" rx="10" fill="rgba(0,0,0,0.2)" stroke="rgba(180,210,230,0.2)" />
  <text x="400" y="568" text-anchor="middle" fill="rgba(180,210,230,0.7)" font-size="14" font-family="Inter,Arial,sans-serif">e.g. Profit?</text>
  <text x="400" y="592" text-anchor="middle" fill="rgba(150,170,195,0.55)" font-size="13" font-family="Inter,Arial,sans-serif">Revenues | Costs → Volume×Price, Fixed+Variable …</text>
</svg>
