<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognitive Atlas Embed</title>
  <meta http-equiv="refresh" content="0; url=./cognitive-atlas.html?simple=1&embed=1" />
  <script>
    (function () {
      var target = new URL("./cognitive-atlas.html", window.location.href);
      var incoming = new URLSearchParams(window.location.search || "");
      incoming.set("simple", "1");
      incoming.set("embed", "1");
      target.search = incoming.toString();
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="./cognitive-atlas.html?simple=1&embed=1">Cognitive Atlas embed view</a>...</p>
</body>
</html>
